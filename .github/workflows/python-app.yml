# .github/workflows/python-app.yml
# Workflow para VULKAN-MLG - CI/CD automático

name: VULKAN-MLG CI/CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  # También puedes ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  # ==================== JOB 1: PRUEBAS ====================
  test:
    name: 🧪 Pruebas en Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          # Excluir combinaciones que no tienen sentido
          - os: macos-latest
            python-version: "3.9"
    
    steps:
    - name: 🔍 Checkout del código
      uses: actions/checkout@v4
    
    - name: 🐍 Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        pip install scapy pillow
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      shell: bash
    
    - name: 🔍 Linting con flake8
      run: |
        # Detener si hay errores de sintaxis
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Advertencias (no detiene, solo informa)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: 🧪 Ejecutar pruebas (si existen)
      run: |
        pytest tests/ --doctest-modules --junitxml=junit/test-results.xml --cov=com --cov-report=xml --cov-report=html
      continue-on-error: true
    
    - name: 📤 Subir reporte de pruebas
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}-${{ matrix.os }}
        path: |
          junit/
          htmlcov/
          coverage.xml
      if: always()

  # ==================== JOB 2: VERIFICACIÓN DE SEGURIDAD ====================
  security:
    name: 🔒 Escaneo de seguridad
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Checkout del código
      uses: actions/checkout@v4
    
    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 🔍 Escanear con Bandit (seguridad en código Python)
      run: |
        pip install bandit
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f html -o bandit-report.html || true
    
    - name: 📤 Subir reporte de seguridad
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: |
          bandit-report.json
          bandit-report.html
      if: always()
    
    - name: 🚨 Verificar dependencias vulnerables
      run: |
        pip install safety
        safety check --json > safety-report.json || true
    
    - name: 📤 Subir reporte de dependencias
      uses: actions/upload-artifact@v4
      with:
        name: safety-report
        path: safety-report.json
      if: always()

  # ==================== JOB 3: COMPILACIÓN (opcional) ====================
  build:
    name: 📦 Compilar ejecutable
    runs-on: windows-latest
    needs: [test]  # Espera a que pasen las pruebas
    if: github.ref == 'refs/heads/main'  # Solo en main/master
    
    steps:
    - name: 🔍 Checkout del código
      uses: actions/checkout@v4
    
    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Instalar PyInstaller
      run: |
        pip install pyinstaller
        pip install scapy pillow
    
    - name: 🏗️ Compilar con PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "Vulkan-MLG" --icon=NUL main.py
        # Si tienes un icono: --icon=icon.ico
    
    - name: 📤 Subir ejecutable
      uses: actions/upload-artifact@v4
      with:
        name: Vulkan-MLG-Windows
        path: dist/Vulkan-MLG.exe
        compression-level: 9

  # ==================== JOB 4: NOTIFICACIÓN (opcional) ====================
  notify:
    name: 📧 Notificar resultado
    runs-on: ubuntu-latest
    needs: [test, security]
    if: always()
    
    steps:
    - name: ✅ Estado de la build
      run: |
        echo "Estado de las pruebas: ${{ needs.test.result }}"
        echo "Estado de seguridad: ${{ needs.security.result }}"
        
        if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.security.result }}" == "success" ]; then
          echo "🎉 Todo correcto!"
        else
          echo "⚠️ Algo falló. Revisa los logs."
        fi
